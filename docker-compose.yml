# /docker-compose.yml


services:
  # 1. Backend API Service
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/ticknest
      - PORT=5000
      - JWT_SECRET=your_super_secret_jwt_key_here # Replace with your actual secret
    depends_on:
      - mongo

  # 2. Frontend Client Service
  client:
    build: ./client
    ports:
      - "5173:80" # Maps localhost:5173 to Nginx's port 80 inside the container
    depends_on:
      - server

  # 3. MongoDB Database Service
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db # Persists your database data locally

# Define the volume for MongoDB
volumes:
  mongo_data: